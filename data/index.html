<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Scoreboard</title>
<style>
body{margin:0;font-family:sans-serif;background:radial-gradient(circle at top,#202020,#080808 70%);color:#fff;display:flex;min-height:100vh;align-items:center;justify-content:center;}
.wrap{text-align:center;width:min(1000px,92vw);}
.teams{display:flex;align-items:center;justify-content:center;gap:28px;font-size:clamp(28px,4vw,56px);font-weight:700;letter-spacing:1px;margin-bottom:24px;}
.team{padding:14px 20px;border:1px solid rgba(255,255,255,.14);border-radius:16px;background:rgba(255,255,255,.05);min-width:220px;}
.vs{font-size:clamp(18px,2vw,28px);color:#bbb;text-transform:uppercase;letter-spacing:4px;}
.total{font-size:clamp(84px,18vw,240px);font-weight:800;line-height:1;letter-spacing:4px;}
</style>
</head>
<body>
<div class="wrap">
  <div class="teams">
    <div id="teamA" class="team">%TEAM_A%</div>
    <div class="vs">vs</div>
    <div id="teamB" class="team">%TEAM_B%</div>
  </div>
  <div id="totalScore" class="total">0 : 0</div>
</div>
<script>
async function refreshScores() {
  try {
    const resp = await fetch('/score');
    if (!resp.ok) return;
    const data = await resp.json();
    document.getElementById('totalScore').textContent = data.totalA + ' : ' + data.totalB;
  } catch (e) {
    console.error(e);
  }
}

refreshScores();
setInterval(refreshScores, 500);
</script>
</body>
</html>
