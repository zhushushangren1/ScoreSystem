<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Score Control</title>
<style>
body{margin:0;font-family:sans-serif;background:#111;color:#fff;display:flex;min-height:100vh;align-items:center;justify-content:center;}
.wrap{text-align:center;width:min(900px,94vw);}
.teams{font-size:28px;margin-bottom:16px;display:flex;gap:12px;justify-content:center;align-items:center;flex-wrap:wrap;}
.name-input,.score-input{background:#222;color:#fff;border:1px solid #555;border-radius:8px;padding:6px 12px;text-align:center;}
.name-input{font-size:28px;width:220px;}
.score-edit{display:flex;align-items:center;justify-content:center;gap:18px;margin:12px 0 18px;}
.score-input{font-size:64px;font-weight:700;width:120px;}
.colon{font-size:64px;font-weight:700;color:#ddd;}
.vs{display:inline-block;color:#aaa;}
.status{font-size:16px;color:#8bc34a;margin-bottom:18px;}
.judge{font-size:20px;color:#bbb;line-height:1.8;}
.actions{margin:22px 0;display:flex;gap:12px;justify-content:center;flex-wrap:wrap;}
.btn-reset,.btn-next,.btn-sync{font-size:18px;color:#fff;border:none;border-radius:8px;padding:10px 18px;cursor:pointer;}
.btn-sync{background:#1565c0;}
.btn-sync:hover{background:#0d47a1;}
.btn-reset{background:#c62828;}
.btn-reset:hover{background:#b71c1c;}
.btn-next{background:#2e7d32;}
.btn-next:hover{background:#1b5e20;}
.countdown-line{font-size:20px;color:#ffeb3b;margin-bottom:10px;display:none;font-variant-numeric:tabular-nums;}
.countdown-line.warn{color:#ff5252;}
@media (max-width:600px){.score-input{font-size:44px;width:92px}.colon{font-size:44px}.name-input{width:180px;font-size:22px}}
</style>
</head>
<body>
<div class="wrap">
  <div class="teams">
    <input id="nameA" class="name-input" value="%TEAM_A%">
    <span class="vs">vs</span>
    <input id="nameB" class="name-input" value="%TEAM_B%">
  </div>
  <div class="score-edit">
    <input id="totalAInput" class="score-input" type="number" min="0" value="0">
    <span class="colon">:</span>
    <input id="totalBInput" class="score-input" type="number" min="0" value="0">
  </div>
  <div id="roundStatus" class="status">当前轮次开放中</div>
  <div id="countdownLine" class="countdown-line">倒计时: <span id="countdownText">00:00</span></div>
  <div class="actions">
    <button id="syncDisplayBtn" class="btn-sync">同步到显示页</button>
    <button id="nextRoundBtn" class="btn-next">下一轮</button>
    <button id="resetTotalBtn" class="btn-reset">重置总比分</button>
  </div>
  <div id="judge_client1" class="judge">裁判1 0 : 0</div>
  <div id="judge_client2" class="judge">裁判2 0 : 0</div>
  <div id="judge_client3" class="judge">裁判3 0 : 0</div>
</div>
<script>
let editing = false;
let countdownActive = false;
let countdownEndAt = 0;

function renderCountdown() {
  const line = document.getElementById('countdownLine');
  if (!countdownActive) {
    line.style.display = 'none';
    return;
  }
  const remainingMs = Math.max(0, countdownEndAt - Date.now());
  const totalSec = Math.ceil(remainingMs / 1000);
  const mm = String(Math.floor(totalSec / 60)).padStart(2, '0');
  const ss = String(totalSec % 60).padStart(2, '0');
  document.getElementById('countdownText').textContent = mm + ':' + ss;
  line.style.display = 'block';
  line.classList.toggle('warn', totalSec <= 10);
}

function setEditingListeners() {
  for (const id of ['nameA', 'nameB', 'totalAInput', 'totalBInput']) {
    const el = document.getElementById(id);
    el.addEventListener('focus', () => editing = true);
    el.addEventListener('input', () => editing = true);
  }
}

async function refreshScores() {
  try {
    const resp = await fetch('/score');
    if (!resp.ok) return;
    const data = await resp.json();

    if (!editing) {
      document.getElementById('nameA').value = data.teamA;
      document.getElementById('nameB').value = data.teamB;
      document.getElementById('totalAInput').value = data.totalA;
      document.getElementById('totalBInput').value = data.totalB;
    }

    document.getElementById('roundStatus').textContent = data.roundOpen
      ? '当前轮次开放中'
      : '当前轮次已锁定，等待开启下一轮';

    for (const j of data.judges) {
      const el = document.getElementById('judge_' + j.id);
      if (!el) continue;

      let title = '裁判';
      if (j.id === 'client1') title = '裁判1';
      else if (j.id === 'client2') title = '裁判2';
      else if (j.id === 'client3') title = '裁判3';

      el.textContent = title + ' ' + j.scoreA + ' : ' + j.scoreB;
    }

    countdownActive = !!data.countdownActive;
    if (countdownActive) {
      countdownEndAt = Date.now() + (data.countdownRemainingMs || 0);
    }
    renderCountdown();
  } catch (e) {
    console.error(e);
  }
}

async function syncDisplay() {
  try {
    const params = new URLSearchParams({
      a: document.getElementById('nameA').value,
      b: document.getElementById('nameB').value,
      totalA: document.getElementById('totalAInput').value || '0',
      totalB: document.getElementById('totalBInput').value || '0'
    });
    const resp = await fetch('/syncDisplay?' + params.toString(), { method: 'POST' });
    if (resp.ok) {
      editing = false;
      await refreshScores();
    }
  } catch (e) {
    console.error(e);
  }
}

window.addEventListener('load', () => {
  setEditingListeners();

  document.getElementById('syncDisplayBtn').addEventListener('click', syncDisplay);

  document.getElementById('nextRoundBtn').addEventListener('click', async () => {
    const input = prompt('请输入本轮倒计时秒数（留空或 0 表示不开启倒计时）', '60');
    if (input === null) return;
    const trimmed = input.trim();
    let seconds = 0;
    if (trimmed !== '') {
      seconds = parseInt(trimmed, 10);
      if (isNaN(seconds) || seconds < 0) {
        alert('请输入有效的非负整数秒数');
        return;
      }
    }
    try {
      const url = seconds > 0 ? '/nextRound?seconds=' + seconds : '/nextRound';
      await fetch(url, { method: 'POST' });
      editing = false;
      await refreshScores();
    } catch (e) {
      console.error(e);
    }
  });

  document.getElementById('resetTotalBtn').addEventListener('click', async () => {
    try {
      await fetch('/resetTotal', { method: 'POST' });
      editing = false;
      await refreshScores();
    } catch (e) {
      console.error(e);
    }
  });
});

refreshScores();
setInterval(refreshScores, 500);
setInterval(renderCountdown, 200);
</script>
</body>
</html>
