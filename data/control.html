<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Score Control</title>
<style>
body{margin:0;font-family:sans-serif;background:#111;color:#fff;display:flex;min-height:100vh;align-items:center;justify-content:center;}
.wrap{text-align:center;width:100%;}
.teams{font-size:32px;margin-bottom:18px;}
.name-input{font-size:32px;background:#222;color:#fff;border:1px solid #555;border-radius:8px;padding:6px 12px;width:220px;text-align:center;}
.vs{display:inline-block;margin:0 14px;color:#aaa;}
.total{font-size:120px;font-weight:700;line-height:1;margin-bottom:20px;}
.status{font-size:16px;color:#8bc34a;margin-bottom:18px;}
.judge{font-size:20px;color:#bbb;line-height:1.8;}
.actions{margin:22px 0;display:flex;gap:12px;justify-content:center;flex-wrap:wrap;}
.btn-reset,.btn-next{font-size:18px;color:#fff;border:none;border-radius:8px;padding:10px 18px;cursor:pointer;}
.btn-reset{background:#c62828;}
.btn-reset:hover{background:#b71c1c;}
.btn-next{background:#2e7d32;}
.btn-next:hover{background:#1b5e20;}
</style>
</head>
<body>
<div class="wrap">
  <div class="teams">
    <input id="nameA" class="name-input" value="%TEAM_A%">
    <span class="vs">vs</span>
    <input id="nameB" class="name-input" value="%TEAM_B%">
  </div>
  <div id="totalScore" class="total">0 : 0</div>
  <div id="roundStatus" class="status">当前轮次开放中</div>
  <div class="actions">
    <button id="nextRoundBtn" class="btn-next">下一轮</button>
    <button id="resetTotalBtn" class="btn-reset">重置总比分</button>
  </div>
  <div id="judge_client1" class="judge">裁判1 0 : 0</div>
  <div id="judge_client2" class="judge">裁判2 0 : 0</div>
  <div id="judge_client3" class="judge">裁判3 0 : 0</div>
</div>
<script>
let saveTimer = null;

async function refreshScores() {
  try {
    const resp = await fetch('/score');
    if (!resp.ok) return;
    const data = await resp.json();

    document.getElementById('totalScore').textContent = data.totalA + ' : ' + data.totalB;
    document.getElementById('roundStatus').textContent = data.roundOpen
      ? '当前轮次开放中'
      : '当前轮次已锁定，等待开启下一轮';

    for (const j of data.judges) {
      const el = document.getElementById('judge_' + j.id);
      if (!el) continue;

      let title = '裁判';
      if (j.id === 'client1') title = '裁判1';
      else if (j.id === 'client2') title = '裁判2';
      else if (j.id === 'client3') title = '裁判3';

      el.textContent = title + ' ' + j.scoreA + ' : ' + j.scoreB;
    }
  } catch (e) {
    console.error(e);
  }
}

async function saveNames() {
  try {
    const a = document.getElementById('nameA').value;
    const b = document.getElementById('nameB').value;
    await fetch('/setNames?a=' + encodeURIComponent(a) + '&b=' + encodeURIComponent(b), { method: 'POST' });
  } catch (e) {
    console.error(e);
  }
}

function queueSaveNames() {
  if (saveTimer) clearTimeout(saveTimer);
  saveTimer = setTimeout(saveNames, 300);
}

window.addEventListener('load', () => {
  document.getElementById('nameA').addEventListener('input', queueSaveNames);
  document.getElementById('nameB').addEventListener('input', queueSaveNames);

  document.getElementById('nextRoundBtn').addEventListener('click', async () => {
    try {
      await fetch('/nextRound', { method: 'POST' });
      await refreshScores();
    } catch (e) {
      console.error(e);
    }
  });

  document.getElementById('resetTotalBtn').addEventListener('click', async () => {
    try {
      await fetch('/resetTotal', { method: 'POST' });
      await refreshScores();
    } catch (e) {
      console.error(e);
    }
  });
});

refreshScores();
setInterval(refreshScores, 500);
</script>
</body>
</html>
